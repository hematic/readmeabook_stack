services:
  readmeabook:
    image: ghcr.io/kikootwo/readmeabook:latest
    container_name: readmeabook
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - PUBLIC_URL=https://rmab.apps.hematic.net
      - JWT_SECRET=${RMAB_JWT_SECRET}
      - JWT_REFRESH_SECRET=${RMAB_JWT_REFRESH_SECRET}
      - CONFIG_ENCRYPTION_KEY=${RMAB_CONFIG_ENCRYPTION_KEY}
    volumes:
      - /volume1/containers/readmeabook/config:/app/config
      - /volume1/containers/readmeabook/cache:/app/cache
      - /volume1/containers/readmeabook/pgdata:/var/lib/postgresql/data
      - /volume1/containers/readmeabook/redis:/var/lib/redis
      # Must match qBittorrent's and Audiobookshelf's real paths exactly --
      # both are NAS shares this container reaches directly, being on the NAS.
      - /volume1/downloads:/downloads
      - /volume1/audiobooks:/media
    ports:
      - 3030:3030
    healthcheck:
      test: ["CMD", "curl", "-s", "--fail", "http://localhost:3030/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
